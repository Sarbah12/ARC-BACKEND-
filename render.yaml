# Render Blueprint for the ARC backend.
# In Render: New + → Blueprint → connect this repo. It reads this file and
# creates the web service. Fill in the secret env vars marked sync:false.
services:
  - type: web
    name: arc-backend
    runtime: node
    plan: free
    region: frankfurt          # closest Render region to Ghana
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://www.arcaccra.org,https://arcaccra.org
      - key: JWT_SECRET
        generateValue: true     # Render generates a strong secret
      - key: SUPABASE_URL
        sync: false             # set in dashboard
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false             # set in dashboard (the secret service_role key)
      - key: ADMIN_TOKEN
        sync: false             # set in dashboard (your admin password)
      # Optional — only if you use these features:
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
