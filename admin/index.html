<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARC Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #111827;
      --green: #2fd27d;
      --purple: #6B4FD8;
      --red: #ef4444;
      --amber: #f59e0b;
      --bg: #f6f5f3;
      --card: #fff;
      --border: #e5e7eb;
      --text: #111;
      --muted: #6b7280;
      --radius: 12px;
    }

    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Login */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .login-card {
      background: var(--card);
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 6px rgba(0,0,0,.04), 0 20px 60px rgba(0,0,0,.08);
    }
    .login-card h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: .3rem; }
    .login-card p { color: var(--muted); font-size: .88rem; margin-bottom: 1.75rem; }
    .login-card input {
      width: 100%; padding: .75rem 1rem; border: 1.5px solid var(--border);
      border-radius: 10px; font-family: inherit; font-size: .9rem;
      outline: none; margin-bottom: 1rem;
      transition: border-color .2s;
    }
    .login-card input:focus { border-color: var(--purple); }
    .login-card button {
      width: 100%; padding: .8rem; background: var(--purple); color: #fff;
      border: none; border-radius: 10px; font-family: inherit;
      font-size: .95rem; font-weight: 700; cursor: pointer;
    }
    .login-error { color: var(--red); font-size: .82rem; margin-top: .75rem; display: none; }

    /* App shell */
    #app { display: none; }

    .topbar {
      background: var(--ink);
      color: #fff;
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar__brand { font-size: 1rem; font-weight: 800; letter-spacing: -.01em; }
    .topbar__brand span { color: var(--green); }
    .topbar__logout {
      background: rgba(255,255,255,.1); border: none; color: #fff;
      padding: .4rem .9rem; border-radius: 8px; font-family: inherit;
      font-size: .8rem; font-weight: 600; cursor: pointer;
    }
    .topbar__logout:hover { background: rgba(255,255,255,.2); }

    .layout { display: flex; min-height: calc(100vh - 60px); }

    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--card);
      border-right: 1px solid var(--border);
      padding: 1.5rem 1rem;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: .65rem;
      padding: .6rem .85rem;
      border-radius: 8px;
      font-size: .88rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      transition: background .15s, color .15s;
      margin-bottom: .25rem;
    }
    .nav-item:hover { background: var(--bg); color: var(--text); }
    .nav-item.active { background: rgba(107,79,216,.08); color: var(--purple); }
    .nav-item .badge {
      margin-left: auto;
      background: var(--red);
      color: #fff;
      font-size: .68rem;
      font-weight: 700;
      padding: .15rem .45rem;
      border-radius: 99px;
    }

    .main { flex: 1; padding: 2rem; overflow-x: auto; }

    /* Stats row */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
    }
    .stat-card__label { font-size: .75rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: .4rem; }
    .stat-card__value { font-size: 2rem; font-weight: 900; letter-spacing: -.03em; }
    .stat-card__sub { font-size: .78rem; color: var(--muted); margin-top: .2rem; }

    /* Section header */
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .section-head h2 { font-size: 1.1rem; font-weight: 800; }

    /* Table */
    .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    thead { background: var(--bg); }
    th { padding: .75rem 1rem; text-align: left; font-size: .72rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
    td { padding: .85rem 1rem; border-top: 1px solid var(--border); vertical-align: middle; }
    tr:hover td { background: #fafafa; }
    .empty { text-align: center; color: var(--muted); padding: 2.5rem; font-size: .88rem; }

    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: .2rem .6rem;
      border-radius: 99px;
      font-size: .72rem;
      font-weight: 700;
    }
    .badge--green  { background: rgba(47,210,125,.12); color: #15803d; }
    .badge--amber  { background: rgba(245,158,11,.12); color: #b45309; }
    .badge--red    { background: rgba(239,68,68,.12);  color: #dc2626; }
    .badge--purple { background: rgba(107,79,216,.12); color: #6B4FD8; }
    .badge--gray   { background: #f3f4f6; color: #6b7280; }

    /* Action buttons */
    .action-btn {
      padding: .3rem .75rem;
      border-radius: 6px;
      font-family: inherit;
      font-size: .75rem;
      font-weight: 700;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: opacity .15s;
    }
    .action-btn:hover { opacity: .8; }
    .action-btn--accept { background: rgba(47,210,125,.12); color: #15803d; border-color: rgba(47,210,125,.3); }
    .action-btn--reject { background: rgba(239,68,68,.12); color: #dc2626; border-color: rgba(239,68,68,.3); }
    .action-btn--read   { background: rgba(107,79,216,.1); color: #6B4FD8; border-color: rgba(107,79,216,.25); }

    /* Tabs */
    .page { display: none; }
    .page.active { display: block; }

    .refresh-btn {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: .4rem .85rem;
      font-family: inherit; font-size: .8rem; font-weight: 600;
      cursor: pointer; color: var(--muted);
    }
    .refresh-btn:hover { color: var(--text); }

    /* Create forms (blogs / events) */
    .form-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .field { display: flex; flex-direction: column; gap: .35rem; }
    .field--full { grid-column: 1 / -1; }
    .field label { font-size: .76rem; font-weight: 700; color: var(--muted); }
    .field input, .field textarea, .field select {
      width: 100%; padding: .6rem .8rem; border: 1.5px solid var(--border);
      border-radius: 9px; font-family: inherit; font-size: .88rem; outline: none;
      background: #fff; transition: border-color .15s;
    }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--purple); }
    .field textarea { resize: vertical; min-height: 90px; }
    .btn-primary {
      margin-top: 1.25rem; background: var(--purple); color: #fff; border: none; border-radius: 9px;
      padding: .7rem 1.4rem; font-family: inherit; font-size: .88rem; font-weight: 700; cursor: pointer;
    }
    .btn-primary:hover { opacity: .9; }
    .btn-primary:disabled { opacity: .5; cursor: default; }
    .action-btn--delete { background: rgba(239,68,68,.1); color: #dc2626; border-color: rgba(239,68,68,.25); }
    .form-msg { font-size: .82rem; margin-top: .6rem; display: none; }
    .form-msg.show { display: block; }
    .form-msg--ok  { color: #15803d; }
    .form-msg--err { color: #dc2626; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { padding: 1rem; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <h1>ARC Admin</h1>
    <p>Enter your admin password to continue.</p>
    <input type="password" id="admin-password" placeholder="Admin password" />
    <button onclick="login()">Sign in</button>
    <p class="login-error" id="login-error">Incorrect password. Try again.</p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="topbar">
    <div class="topbar__brand">ARC <span>Admin</span></div>
    <button class="topbar__logout" onclick="logout()">Sign out</button>
  </header>

  <div class="layout">
    <!-- Sidebar -->
    <nav class="sidebar">
      <button class="nav-item active" onclick="showPage('overview', this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Overview
      </button>
      <button class="nav-item" onclick="showPage('users', this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Users
      </button>
      <button class="nav-item" id="nav-registrations" onclick="showPage('registrations', this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Registrations
      </button>
      <button class="nav-item" id="nav-enquiries" onclick="showPage('enquiries', this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Enquiries
      </button>
      <button class="nav-item" onclick="showPage('blogs', this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Blogs
      </button>
      <button class="nav-item" onclick="showPage('events', this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Events
      </button>
    </nav>

    <!-- Main content -->
    <main class="main">

      <!-- OVERVIEW -->
      <div class="page active" id="page-overview">
        <div class="stats-grid" id="stats-grid">
          <div class="stat-card"><div class="stat-card__label">Total Users</div><div class="stat-card__value" id="stat-users">—</div></div>
          <div class="stat-card"><div class="stat-card__label">Registrations</div><div class="stat-card__value" id="stat-regs">—</div><div class="stat-card__sub" id="stat-regs-sub"></div></div>
          <div class="stat-card"><div class="stat-card__label">Enquiries</div><div class="stat-card__value" id="stat-enq">—</div><div class="stat-card__sub" id="stat-enq-sub"></div></div>
          <div class="stat-card"><div class="stat-card__label">Events</div><div class="stat-card__value" id="stat-events">—</div></div>
        </div>

        <div class="section-head"><h2>Recent Registrations</h2></div>
        <div class="table-wrap" id="overview-regs-table"></div>
      </div>

      <!-- USERS -->
      <div class="page" id="page-users">
        <div class="section-head">
          <h2>All Users</h2>
          <button class="refresh-btn" onclick="loadUsers()">↻ Refresh</button>
        </div>
        <div class="table-wrap" id="users-table"></div>
      </div>

      <!-- REGISTRATIONS -->
      <div class="page" id="page-registrations">
        <div class="section-head">
          <h2>Course Registrations</h2>
          <button class="refresh-btn" onclick="loadRegistrations()">↻ Refresh</button>
        </div>
        <div class="table-wrap" id="registrations-table"></div>
      </div>

      <!-- ENQUIRIES -->
      <div class="page" id="page-enquiries">
        <div class="section-head">
          <h2>Enquiries</h2>
          <button class="refresh-btn" onclick="loadEnquiries()">↻ Refresh</button>
        </div>
        <div class="table-wrap" id="enquiries-table"></div>
      </div>

      <!-- BLOGS -->
      <div class="page" id="page-blogs">
        <div class="section-head">
          <h2>Blog Posts</h2>
          <button class="refresh-btn" onclick="loadBlogs()">↻ Refresh</button>
        </div>
        <form class="form-card" onsubmit="createBlog(event)">
          <div class="form-grid">
            <div class="field field--full"><label>Title *</label><input name="title" required maxlength="160" /></div>
            <div class="field"><label>Author</label><input name="author_name" placeholder="ARC Team" /></div>
            <div class="field"><label>Category</label><input name="category" placeholder="General" /></div>
            <div class="field field--full"><label>Excerpt</label><input name="excerpt" maxlength="300" placeholder="Short summary shown in listings" /></div>
            <div class="field field--full"><label>Cover image URL</label><input name="cover_image" type="url" placeholder="https://…" /></div>
            <div class="field field--full"><label>Content *</label><textarea name="content" required placeholder="Write the post…"></textarea></div>
            <div class="field"><label>Status</label><select name="status"><option value="draft">Draft</option><option value="published">Published</option></select></div>
          </div>
          <button type="submit" class="btn-primary">Save post</button>
          <p class="form-msg" id="blog-msg"></p>
        </form>
        <div class="table-wrap" id="blogs-table"></div>
      </div>

      <!-- EVENTS -->
      <div class="page" id="page-events">
        <div class="section-head">
          <h2>Events</h2>
          <button class="refresh-btn" onclick="loadEvents()">↻ Refresh</button>
        </div>
        <form class="form-card" onsubmit="createEvent(event)">
          <div class="form-grid">
            <div class="field field--full"><label>Title *</label><input name="title" required maxlength="160" /></div>
            <div class="field"><label>Date &amp; time *</label><input name="date" type="datetime-local" required /></div>
            <div class="field"><label>Location</label><input name="location" placeholder="ARC Campus, Accra" /></div>
            <div class="field"><label>Mode</label><select name="mode"><option value="in-person">In-person</option><option value="online">Online</option><option value="hybrid">Hybrid</option></select></div>
            <div class="field"><label>Capacity</label><input name="capacity" type="number" min="0" placeholder="e.g. 50" /></div>
            <div class="field field--full"><label>Cover image URL</label><input name="image_url" type="url" placeholder="https://…" /></div>
            <div class="field field--full"><label>Description</label><textarea name="description" placeholder="What's the event about?"></textarea></div>
            <div class="field"><label>Status</label><select name="status"><option value="upcoming">Upcoming</option><option value="past">Past</option><option value="cancelled">Cancelled</option></select></div>
          </div>
          <button type="submit" class="btn-primary">Create event</button>
          <p class="form-msg" id="event-msg"></p>
        </form>
        <div class="table-wrap" id="events-table"></div>
      </div>

    </main>
  </div>
</div>

<script>
  // Same-origin: the admin panel is served by this backend, so call it directly.
  const API = '';
  let adminToken = '';

  // ── Authenticated fetch with shared error handling ──
  // Adds the admin token, kicks back to login on 401, and throws on any
  // non-OK response so callers can show a friendly message.
  async function authedFetch(path, opts = {}) {
    const res = await fetch(`${API}${path}`, {
      ...opts,
      headers: { ...(opts.headers || {}), Authorization: `Bearer ${adminToken}` },
    });
    if (res.status === 401) {
      sessionStorage.removeItem('arc_admin');
      location.reload();
      throw new Error('Session expired');
    }
    if (!res.ok) throw new Error(`Request failed (${res.status})`);
    return res.json();
  }

  function showTableError(elId) {
    document.getElementById(elId).innerHTML =
      '<p class="empty" style="color:#dc2626">Couldn\'t load data. The server may be redeploying — refresh in a moment.</p>';
  }

  // ── Auth ──
  async function login() {
    const pw = document.getElementById('admin-password').value.trim();
    const errEl = document.getElementById('login-error');
    if (!pw) return;
    errEl.style.display = 'none';

    try {
      const res = await fetch(`${API}/api/admin/stats`, {
        headers: { Authorization: `Bearer ${pw}` }
      });
      if (res.ok) {
        adminToken = pw;
        sessionStorage.setItem('arc_admin', pw);
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        loadAll();
      } else {
        errEl.textContent = res.status === 401
          ? 'Incorrect password. Try again.'
          : `Sign-in failed (${res.status}). The server may be redeploying.`;
        errEl.style.display = 'block';
      }
    } catch (err) {
      errEl.textContent = 'Cannot reach the server. Check your connection and try again.';
      errEl.style.display = 'block';
    }
  }

  document.getElementById('admin-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  function logout() {
    sessionStorage.removeItem('arc_admin');
    location.reload();
  }

  // Auto-login if session exists
  const saved = sessionStorage.getItem('arc_admin');
  if (saved) {
    adminToken = saved;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadAll();
  }

  // ── Navigation ──
  function showPage(name, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(`page-${name}`).classList.add('active');
    btn.classList.add('active');
    if (name === 'users') loadUsers();
    if (name === 'registrations') loadRegistrations();
    if (name === 'enquiries') loadEnquiries();
    if (name === 'blogs') loadBlogs();
    if (name === 'events') loadEvents();
  }

  // ── Load all ──
  function loadAll() {
    loadStats();
    loadOverviewRegs();
  }

  // ── Stats ──
  async function loadStats() {
    try {
      const { stats } = await authedFetch('/api/admin/stats');
      document.getElementById('stat-users').textContent = stats.users;
      document.getElementById('stat-regs').textContent = stats.registrations;
      document.getElementById('stat-regs-sub').textContent = `${stats.pendingRegistrations} pending`;
      document.getElementById('stat-enq').textContent = stats.enquiries;
      document.getElementById('stat-enq-sub').textContent = `${stats.unreadEnquiries} unread`;
      document.getElementById('stat-events').textContent = stats.events;

      // Update sidebar badges (replace, never accumulate)
      setNavBadge('nav-registrations', stats.pendingRegistrations);
      setNavBadge('nav-enquiries', stats.unreadEnquiries);
    } catch (err) {
      console.error('[stats]', err);
    }
  }

  // Set or clear a single count badge on a sidebar item without duplicating it.
  function setNavBadge(navId, count) {
    const nav = document.getElementById(navId);
    const existing = nav.querySelector('.badge');
    if (existing) existing.remove();
    if (count > 0) {
      const span = document.createElement('span');
      span.className = 'badge';
      span.textContent = count;
      nav.appendChild(span);
    }
  }

  // ── Overview recent regs ──
  async function loadOverviewRegs() {
    try {
      const { registrations } = await authedFetch('/api/admin/registrations');
      const recent = (registrations || []).slice(0, 5);
      document.getElementById('overview-regs-table').innerHTML = renderRegsTable(recent);
    } catch (err) {
      showTableError('overview-regs-table');
    }
  }

  // ── Users ──
  async function loadUsers() {
    document.getElementById('users-table').innerHTML = '<p class="empty">Loading…</p>';
    let users;
    try {
      ({ users } = await authedFetch('/api/admin/users'));
    } catch (err) {
      showTableError('users-table');
      return;
    }
    if (!users?.length) { document.getElementById('users-table').innerHTML = '<p class="empty">No users yet.</p>'; return; }

    document.getElementById('users-table').innerHTML = `
      <table>
        <thead><tr>
          <th>Name</th><th>Email</th><th>Course Interest</th><th>Role</th><th>Joined</th>
        </tr></thead>
        <tbody>
          ${users.map(u => `
            <tr>
              <td><strong>${esc(u.first_name)} ${esc(u.last_name)}</strong></td>
              <td>${esc(u.email)}</td>
              <td>${u.course_interest ? esc(u.course_interest) : '<span style="color:#bbb">—</span>'}</td>
              <td><span class="badge ${u.role === 'admin' ? 'badge--purple' : 'badge--gray'}">${u.role}</span></td>
              <td style="color:var(--muted)">${fmtDate(u.created_at)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }

  // ── Registrations ──
  async function loadRegistrations() {
    document.getElementById('registrations-table').innerHTML = '<p class="empty">Loading…</p>';
    try {
      const { registrations } = await authedFetch('/api/admin/registrations');
      document.getElementById('registrations-table').innerHTML = renderRegsTable(registrations, true);
    } catch (err) {
      showTableError('registrations-table');
    }
  }

  function renderRegsTable(regs, showActions = false) {
    if (!regs?.length) return '<p class="empty">No registrations yet.</p>';
    return `
      <table>
        <thead><tr>
          <th>Name</th><th>Email</th><th>Course</th><th>Status</th><th>Date</th>
          ${showActions ? '<th>Actions</th>' : ''}
        </tr></thead>
        <tbody>
          ${regs.map(r => `
            <tr id="reg-${r.id}">
              <td><strong>${esc(r.first_name)} ${esc(r.last_name)}</strong></td>
              <td>${esc(r.email)}</td>
              <td>${esc(r.course)}</td>
              <td>${statusBadge(r.status)}</td>
              <td style="color:var(--muted)">${fmtDate(r.created_at)}</td>
              ${showActions ? `
                <td style="display:flex;gap:.4rem;">
                  ${r.status !== 'accepted' ? `<button class="action-btn action-btn--accept" onclick="updateReg('${r.id}','accepted')">Accept</button>` : ''}
                  ${r.status !== 'rejected' ? `<button class="action-btn action-btn--reject" onclick="updateReg('${r.id}','rejected')">Reject</button>` : ''}
                </td>` : '<td></td>'}
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }

  async function updateReg(id, status) {
    try {
      await authedFetch('/api/admin/registrations', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, status }),
      });
      loadRegistrations();
      loadStats();
    } catch (err) {
      alert('Could not update the registration. Please try again.');
    }
  }

  // ── Enquiries ──
  async function loadEnquiries() {
    document.getElementById('enquiries-table').innerHTML = '<p class="empty">Loading…</p>';
    let enquiries;
    try {
      ({ enquiries } = await authedFetch('/api/admin/enquiries'));
    } catch (err) {
      showTableError('enquiries-table');
      return;
    }
    if (!enquiries?.length) { document.getElementById('enquiries-table').innerHTML = '<p class="empty">No enquiries yet.</p>'; return; }

    document.getElementById('enquiries-table').innerHTML = `
      <table>
        <thead><tr>
          <th>Name</th><th>Email</th><th>Subject</th><th>Message</th><th>Status</th><th>Date</th><th></th>
        </tr></thead>
        <tbody>
          ${enquiries.map(e => `
            <tr>
              <td><strong>${esc(e.name)}</strong></td>
              <td>${esc(e.email)}</td>
              <td>${e.subject ? esc(e.subject) : '<span style="color:#bbb">—</span>'}</td>
              <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(e.message)}</td>
              <td>${e.read ? '<span class="badge badge--gray">Read</span>' : '<span class="badge badge--amber">Unread</span>'}</td>
              <td style="color:var(--muted)">${fmtDate(e.created_at)}</td>
              <td>${!e.read ? `<button class="action-btn action-btn--read" onclick="markRead('${e.id}')">Mark read</button>` : ''}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }

  async function markRead(id) {
    try {
      await authedFetch('/api/admin/enquiries', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id }),
      });
      loadEnquiries();
      loadStats();
    } catch (err) {
      alert('Could not mark the enquiry as read. Please try again.');
    }
  }

  // ── Blogs ──
  async function loadBlogs() {
    document.getElementById('blogs-table').innerHTML = '<p class="empty">Loading…</p>';
    let posts;
    try { ({ posts } = await authedFetch('/api/admin/blogs')); }
    catch (err) { showTableError('blogs-table'); return; }
    if (!posts?.length) { document.getElementById('blogs-table').innerHTML = '<p class="empty">No posts yet. Create one above.</p>'; return; }
    document.getElementById('blogs-table').innerHTML = `
      <table>
        <thead><tr><th>Title</th><th>Category</th><th>Status</th><th>Created</th><th></th></tr></thead>
        <tbody>
          ${posts.map(p => `
            <tr>
              <td><strong>${esc(p.title)}</strong></td>
              <td>${p.category ? esc(p.category) : '<span style="color:#bbb">—</span>'}</td>
              <td><span class="badge ${p.status === 'published' ? 'badge--green' : 'badge--gray'}">${esc(p.status)}</span></td>
              <td style="color:var(--muted)">${fmtDate(p.created_at)}</td>
              <td><button class="action-btn action-btn--delete" onclick="deleteBlog('${p.id}')">Delete</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }

  async function createBlog(e) {
    e.preventDefault();
    const form = e.target;
    const body = Object.fromEntries(new FormData(form));
    const btn = form.querySelector('button[type=submit]');
    btn.disabled = true;
    try {
      await authedFetch('/api/admin/blogs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      formMsg('blog-msg', 'Post saved.', true);
      form.reset();
      loadBlogs();
    } catch (err) {
      formMsg('blog-msg', 'Could not save the post. Title and content are required.', false);
    } finally {
      btn.disabled = false;
    }
  }

  async function deleteBlog(id) {
    if (!confirm('Delete this post? This cannot be undone.')) return;
    try {
      await authedFetch('/api/admin/blogs', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id }),
      });
      loadBlogs();
    } catch (err) { alert('Could not delete the post.'); }
  }

  // ── Events ──
  async function loadEvents() {
    document.getElementById('events-table').innerHTML = '<p class="empty">Loading…</p>';
    let events;
    try { ({ events } = await authedFetch('/api/admin/events')); }
    catch (err) { showTableError('events-table'); return; }
    if (!events?.length) { document.getElementById('events-table').innerHTML = '<p class="empty">No events yet. Create one above.</p>'; return; }
    document.getElementById('events-table').innerHTML = `
      <table>
        <thead><tr><th>Title</th><th>Date</th><th>Location</th><th>Mode</th><th>RSVPs</th><th>Status</th><th></th></tr></thead>
        <tbody>
          ${events.map(ev => {
            const rsvps = Array.isArray(ev.event_rsvps) && ev.event_rsvps[0] ? ev.event_rsvps[0].count : 0;
            return `
            <tr>
              <td><strong>${esc(ev.title)}</strong></td>
              <td style="color:var(--muted)">${fmtDateTime(ev.date)}</td>
              <td>${ev.location ? esc(ev.location) : '<span style="color:#bbb">—</span>'}</td>
              <td>${esc(ev.mode || '—')}</td>
              <td>${rsvps}</td>
              <td><span class="badge ${ev.status === 'upcoming' ? 'badge--green' : 'badge--gray'}">${esc(ev.status)}</span></td>
              <td><button class="action-btn action-btn--delete" onclick="deleteEvent('${ev.id}')">Delete</button></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`;
  }

  async function createEvent(e) {
    e.preventDefault();
    const form = e.target;
    const body = Object.fromEntries(new FormData(form));
    if (!body.capacity) delete body.capacity;   // empty → let DB default
    const btn = form.querySelector('button[type=submit]');
    btn.disabled = true;
    try {
      await authedFetch('/api/admin/events', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      formMsg('event-msg', 'Event created.', true);
      form.reset();
      loadEvents();
    } catch (err) {
      formMsg('event-msg', 'Could not create the event. Title and date are required.', false);
    } finally {
      btn.disabled = false;
    }
  }

  async function deleteEvent(id) {
    if (!confirm('Delete this event? This cannot be undone.')) return;
    try {
      await authedFetch('/api/admin/events', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id }),
      });
      loadEvents();
    } catch (err) { alert('Could not delete the event.'); }
  }

  function formMsg(id, text, ok) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'form-msg show ' + (ok ? 'form-msg--ok' : 'form-msg--err');
    if (ok) setTimeout(() => { el.className = 'form-msg'; }, 4000);
  }

  // ── Helpers ──
  // Escape user-submitted text before injecting into innerHTML (prevents stored XSS).
  function esc(v) {
    return String(v ?? '').replace(/[&<>"']/g, (c) => (
      { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
    ));
  }

  function statusBadge(s) {
    const map = { accepted: 'badge--green', pending: 'badge--amber', rejected: 'badge--red' };
    return `<span class="badge ${map[s] || 'badge--gray'}">${s}</span>`;
  }

  function fmtDate(d) {
    return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function fmtDateTime(d) {
    if (!d) return '—';
    return new Date(d).toLocaleString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  }
</script>
</body>
</html>
